<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1410"/>
      <stop offset="100%" stop-color="#2a2018"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>
  <!-- 光晕 -->
  <circle cx="256" cy="256" r="200" fill="#4D7B8C" fill-opacity="0.06"/>
  <!-- 芯片外框 -->
  <rect x="128" y="128" width="256" height="256" rx="20" fill="#F5F2EB" fill-opacity="0.06" stroke="#4D7B8C" stroke-width="3" stroke-opacity="0.6"/>
  <!-- 芯片引脚 - 顶部 -->
  <line x1="176" y1="128" x2="176" y2="96" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="256" y1="128" x2="256" y2="96" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="336" y1="128" x2="336" y2="96" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- 芯片引脚 - 底部 -->
  <line x1="176" y1="384" x2="176" y2="416" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="256" y1="384" x2="256" y2="416" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="336" y1="384" x2="336" y2="416" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- 芯片引脚 - 左侧 -->
  <line x1="128" y1="176" x2="96" y2="176" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="128" y1="256" x2="96" y2="256" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="128" y1="336" x2="96" y2="336" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- 芯片引脚 - 右侧 -->
  <line x1="384" y1="176" x2="416" y2="176" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="384" y1="256" x2="416" y2="256" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <line x1="384" y1="336" x2="416" y2="336" stroke="#4D7B8C" stroke-width="4" stroke-linecap="round" stroke-opacity="0.55"/>
  <!-- 内部电路纹路 -->
  <path d="M176 176 L256 176 L256 256 L336 256" stroke="#5B9B9E" stroke-width="3" fill="none" stroke-linecap="round" stroke-opacity="0.7"/>
  <path d="M176 336 L208 336 L208 304" stroke="#D4943D" stroke-width="3" fill="none" stroke-linecap="round" stroke-opacity="0.8"/>
  <!-- 节点 -->
  <circle cx="176" cy="176" r="8" fill="#5B9B9E" fill-opacity="0.9"/>
  <circle cx="336" cy="256" r="8" fill="#D4943D" fill-opacity="0.9"/>
  <circle cx="208" cy="304" r="6" fill="#C96A4D" fill-opacity="0.8"/>
  <!-- 颜料斑点 -->
  <circle cx="352" cy="352" r="14" fill="#D4943D" fill-opacity="0.35"/>
  <circle cx="160" cy="352" r="10" fill="#C96A4D" fill-opacity="0.25"/>
</svg>
