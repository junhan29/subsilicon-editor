name: CI/CD

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [18, 20]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build renderer
        run: npm run build

  build-web:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

      - name: Package web
        run: zip -r subsilicon-editor.zip dist/

      - name: Upload web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: subsilicon-editor.zip

  build-macos:
    needs: test
    runs-on: macos-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node build/generate-icons.cjs

      - name: Build macOS (arm64)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run electron:build:mac

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-builds
          path: release/SubSilicon*

  build-windows:
    needs: test
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node build/generate-icons.cjs

      - name: Build Windows (x64 + arm64)
        run: npm run electron:build:win

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-builds
          path: release/SubSilicon*

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-0 \
            libnotify-dev \
            libnss3 \
            libxss1 \
            libxtst6 \
            xdg-utils \
            libatspi2.0-0 \
            libuuid1 \
            libsecret-1-0 \
            rpm \
            fakeroot

      - name: Install dependencies
        run: npm ci

      - name: Generate icons
        run: node build/generate-icons.cjs

      - name: Build Linux (x64 + arm64)
        run: npm run electron:build:linux

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-builds
          path: release/SubSilicon*

  release:
    needs: [build-web, build-macos, build-windows, build-linux]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: List files
        run: ls -la release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body: |
            ## SubSilicon Editor ${{ github.ref_name }}

            零代码可视化互动叙事编辑器，支持多平台分发。

            ### 下载

            | 平台 | 文件 |
            |------|------|
            | 通用（Web） | subsilicon-editor.zip |
            | macOS (Apple Silicon) | SubSilicon.Editor-${{ github.ref_name }}-macos-arm64.dmg |
            | Windows x64 | SubSilicon.Editor-${{ github.ref_name }}-windows-x64.zip |
            | Windows arm64 | SubSilicon.Editor-${{ github.ref_name }}-windows-arm64.zip |
            | Linux x64 | SubSilicon.Editor-${{ github.ref_name }}-linux-x64.AppImage |
            | Linux arm64 | SubSilicon.Editor-${{ github.ref_name }}-linux-arm64.AppImage |

            ### 安装说明

            **macOS**：打开 DMG，将应用拖到应用程序文件夹。首次打开若提示「已损坏」，在终端运行：

            ```bash
            xattr -cr /Applications/SubSilicon\ Editor.app
            ```

            **Windows**：解压 ZIP，运行 SubSilicon Editor.exe

            **Linux**：赋予执行权限后运行 AppImage

            **Web 版本**：解压后用浏览器打开 index.html
          files: |
            release-artifacts/subsilicon-editor.zip
            release-artifacts/SubSilicon*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
