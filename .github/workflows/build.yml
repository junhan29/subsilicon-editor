name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: npm run electron:build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: npm run electron:build:win

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run electron:build:linux

      - name: List release files
        if: matrix.os != 'windows-latest'
        run: ls -la release/

      - name: List release files (Windows)
        if: matrix.os == 'windows-latest'
        run: dir release\

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb
            release/*.rpm
            release/*.tar.gz
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release

      - name: List downloaded files
        run: ls -la release/

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          artifacts: "release/*"
          token: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🚀 Release ${{ github.ref_name }}
            
            ### 下载
            
            **macOS**: SubSilicon-Editor-${{ github.ref_name }}-macos-arm64.dmg
            **Windows**: SubSilicon-Editor-${{ github.ref_name }}-windows-x64.exe
            **Linux**: SubSilicon-Editor-${{ github.ref_name }}-linux-x64.AppImage
            
            ### 更新内容
            
            - 零代码可视化互动叙事编辑器
            - AI 辅助创作功能
            - 插件系统支持
            - 读者行为分析
            - 多平台支持

      - name: Sync releases to Tencent Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          RELEASE_DIR="/var/www/subsilicon/releases/v${VERSION}"

          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "📤 同步安装包到服务器: $RELEASE_DIR"
          ssh "$SERVER_USER@$SERVER_HOST" "mkdir -p $RELEASE_DIR && chown -R www-data:www-data /var/www/subsilicon/releases"
          scp release/* "$SERVER_USER@$SERVER_HOST:$RELEASE_DIR/"
          ssh "$SERVER_USER@$SERVER_HOST" "ls -la $RELEASE_DIR/"
          echo "✅ 同步完成"

      - name: Purge old artifacts
        uses: geekyeggo/delete-artifact@v5
        with:
          name: '*'
          failOnError: false