name: Build & Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (不含 v)'
        required: true
        default: '1.2.3'

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: npm run electron:build:mac
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: npm run electron:build:win

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: npm run electron:build:linux

      - name: List release files
        run: ls release/

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-build
          path: release/
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: release

      - name: List release files
        run: ls release/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          gh release create "${{ github.ref_name }}" \
            --title "Release ${{ github.ref_name }}" \
            --notes "## SubSilicon Editor v$VERSION

          ### 下载

          | 平台 | 文件 |
          |------|------|
          | macOS (Apple Silicon) | SubSilicon Editor-$VERSION-macos-arm64.dmg |
          | macOS (Intel) | SubSilicon Editor-$VERSION-macos-x64.dmg |
          | Windows | SubSilicon Editor-$VERSION-windows-x64.exe |
          | Linux | SubSilicon Editor-$VERSION-linux-x86_64.AppImage |
          " \
            release/*.dmg release/*.exe release/*.AppImage release/*.zip release/*.deb release/*.tar.gz

      - name: Sync release to Tencent Server
        env:
          SERVER_HOST: ${{ secrets.DEPLOY_HOST }}
          SERVER_USER: ${{ secrets.DEPLOY_USER }}
          SERVER_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: '22022'
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VERSION_DIR="/var/www/subsilicon/releases/v${VERSION}"
          RELEASE_DIR="/var/www/subsilicon/releases"
          MIRROR="https://gh-proxy.com/https://github.com/junhan29/subsilicon-editor/releases/download/${GITHUB_REF_NAME}"

          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$SSH_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "Creating version directory on server..."
          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" "mkdir -p $VERSION_DIR"

          echo "Downloading release assets on server via gh-proxy.com mirror..."
          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" "
            cd $VERSION_DIR
            FILES=(
              'SubSilicon.Editor-${VERSION}-macos-arm64.dmg'
              'SubSilicon.Editor-${VERSION}-macos-arm64.zip'
              'SubSilicon.Editor-${VERSION}-macos-x64.dmg'
              'SubSilicon.Editor-${VERSION}-macos-x64.zip'
              'SubSilicon.Editor-${VERSION}-windows-x64.exe'
              'SubSilicon.Editor-${VERSION}-windows-x64.zip'
              'SubSilicon.Editor-${VERSION}-linux-amd64.deb'
              'SubSilicon.Editor-${VERSION}-linux-x64.tar.gz'
              'SubSilicon.Editor-${VERSION}-linux-x86_64.AppImage'
            )
            for f in \"\${FILES[@]}\"; do
              if [ -f \"\$f\" ] || [ -f \"\${f/.Editor-/.Editor -}\" ]; then
                echo \"Skipping \$f (already exists)\"
                continue
              fi
              echo \"Downloading \$f...\"
              curl -sL --max-time 300 -o \"\$f\" \"${MIRROR}/\$f\"
              if [ \$? -eq 0 ] && [ -s \"\$f\" ]; then
                echo \"  Done: \$(ls -lh \$f | awk '{print \$5}')\"
              else
                echo \"  Failed: \$f\"
              fi
            done
          "

          echo "Renaming files (dot to space in product name)..."
          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" "
            cd $VERSION_DIR
            for f in SubSilicon.Editor-*; do
              [ -f \"\$f\" ] && mv -v \"\$f\" \"\${f/.Editor-/.Editor -}\" || true
            done
          "

          echo "Generating update metadata yml files..."
          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" "
            cd $VERSION_DIR

            MAC_X64_ZIP_SHA=\$(sha512sum \"SubSilicon Editor-${VERSION}-macos-x64.zip\" | awk '{print \$1}')
            MAC_ARM64_ZIP_SHA=\$(sha512sum \"SubSilicon Editor-${VERSION}-macos-arm64.zip\" | awk '{print \$1}')
            MAC_X64_DMG_SHA=\$(sha512sum \"SubSilicon Editor-${VERSION}-macos-x64.dmg\" | awk '{print \$1}')
            MAC_ARM64_DMG_SHA=\$(sha512sum \"SubSilicon Editor-${VERSION}-macos-arm64.dmg\" | awk '{print \$1}')
            MAC_X64_ZIP_SIZE=\$(stat -c%s \"SubSilicon Editor-${VERSION}-macos-x64.zip\")
            MAC_ARM64_ZIP_SIZE=\$(stat -c%s \"SubSilicon Editor-${VERSION}-macos-arm64.zip\")
            MAC_X64_DMG_SIZE=\$(stat -c%s \"SubSilicon Editor-${VERSION}-macos-x64.dmg\")
            MAC_ARM64_DMG_SIZE=\$(stat -c%s \"SubSilicon Editor-${VERSION}-macos-arm64.dmg\")

            cat > latest-mac.yml << EOF
          version: ${VERSION}
          files:
            - url: SubSilicon Editor-${VERSION}-macos-x64.zip
              sha512: \${MAC_X64_ZIP_SHA}
              size: \${MAC_X64_ZIP_SIZE}
            - url: SubSilicon Editor-${VERSION}-macos-arm64.zip
              sha512: \${MAC_ARM64_ZIP_SHA}
              size: \${MAC_ARM64_ZIP_SIZE}
            - url: SubSilicon Editor-${VERSION}-macos-x64.dmg
              sha512: \${MAC_X64_DMG_SHA}
              size: \${MAC_X64_DMG_SIZE}
            - url: SubSilicon Editor-${VERSION}-macos-arm64.dmg
              sha512: \${MAC_ARM64_DMG_SHA}
              size: \${MAC_ARM64_DMG_SIZE}
          path: SubSilicon Editor-${VERSION}-macos-x64.zip
          sha512: \${MAC_X64_ZIP_SHA}
          releaseDate: '\$(date -u +%Y-%m-%dT%H:%M:%SZ)'
          EOF

            WIN_EXE_SHA=\$(sha512sum \"SubSilicon Editor-${VERSION}-windows-x64.exe\" | awk '{print \$1}')
            WIN_EXE_SIZE=\$(stat -c%s \"SubSilicon Editor-${VERSION}-windows-x64.exe\")

            cat > latest.yml << EOF
          version: ${VERSION}
          files:
            - url: SubSilicon Editor-${VERSION}-windows-x64.exe
              sha512: \${WIN_EXE_SHA}
              size: \${WIN_EXE_SIZE}
          path: SubSilicon Editor-${VERSION}-windows-x64.exe
          sha512: \${WIN_EXE_SHA}
          releaseDate: '\$(date -u +%Y-%m-%dT%H:%M:%SZ)'
          EOF
          "

          echo "Creating standalone symlink..."
          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" "
            STANDALONE_DIR=\"/var/www/subsilicon/.next/standalone/releases\"
            if [ -d \"\$STANDALONE_DIR\" ]; then
              ln -sf \"$VERSION_DIR\" \"\$STANDALONE_DIR/v${VERSION}\"
              echo \"Symlink created: \$STANDALONE_DIR/v${VERSION} -> $VERSION_DIR\"
            fi
          "

          echo "Copying root yml files and restarting PM2..."
          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" "
            cp $VERSION_DIR/latest-mac.yml $RELEASE_DIR/latest-mac.yml
            cp $VERSION_DIR/latest.yml $RELEASE_DIR/latest.yml
            pm2 restart subsilicon 2>&1 || true
            echo 'PM2 restarted'
          "

          echo "=== Verification ==="
          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" "ls -lh $VERSION_DIR/"
          echo "=== Sync complete ==="

      - uses: geekyeggo/delete-artifact@v5
        with:
          name: '*'
          failOnError: false
