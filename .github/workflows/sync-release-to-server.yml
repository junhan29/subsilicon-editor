name: Sync Release to Tencent Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.2.3)'
        required: true
        default: 'v1.2.3'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.event.inputs.version }}
          mkdir -p release
          cd release
          echo "Downloading Release $VERSION assets..."
          gh release download "$VERSION"
          echo "Download complete"
          ls -la

      - name: Setup SSH
        env:
          SERVER_HOST: ${{ secrets.DEPLOY_HOST }}
          SERVER_USER: ${{ secrets.DEPLOY_USER }}
          SERVER_SSH_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_PORT: '22022'
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "$SSH_PORT" -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync to Tencent Server
        env:
          SERVER_HOST: ${{ secrets.DEPLOY_HOST }}
          SERVER_USER: ${{ secrets.DEPLOY_USER }}
          SSH_PORT: '22022'
        run: |
          VERSION=${{ github.event.inputs.version }}
          VERSION_NO_V=${VERSION#v}
          VERSION_DIR="/var/www/subsilicon/releases/v${VERSION_NO_V}"
          RELEASE_DIR="/var/www/subsilicon/releases"

          echo "Syncing to server: $VERSION_DIR"
          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" "mkdir -p $VERSION_DIR && chown -R www-data:www-data /var/www/subsilicon/releases"
          scp -P "$SSH_PORT" release/* "$SERVER_USER@$SERVER_HOST:$VERSION_DIR/"

          echo "Syncing latest.yml for auto-updater"
          scp -P "$SSH_PORT" release/latest-mac.yml release/latest.yml "$SERVER_USER@$SERVER_HOST:$RELEASE_DIR/" 2>/dev/null || true

          echo "Verifying"
          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" "ls -la $RELEASE_DIR/"
          ssh -p "$SSH_PORT" "$SERVER_USER@$SERVER_HOST" "ls -la $VERSION_DIR/"
          echo "Sync complete"
