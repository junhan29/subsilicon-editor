name: Sync Release to Tencent Server

on:
  workflow_dispatch:
    inputs:
      version:
        description: '版本号 (例如: v1.1.0)'
        required: true
        default: 'v1.1.0'

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ github.event.inputs.version }}
          mkdir -p release
          cd release
          echo "📥 下载 Release $VERSION 资产..."
          gh release download "$VERSION" --repo junhan29/subsilicon-editor
          echo "✅ 下载完成"
          ls -la

      - name: Setup SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SERVER_SSH_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Sync to Tencent Server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          VERSION=${{ github.event.inputs.version }}
          VERSION_NO_V=${VERSION#v}
          RELEASE_DIR="/var/www/subsilicon/releases/v${VERSION_NO_V}"

          echo "📤 同步安装包到服务器: $RELEASE_DIR"
          ssh "$SERVER_USER@$SERVER_HOST" "mkdir -p $RELEASE_DIR && chown -R www-data:www-data /var/www/subsilicon/releases"
          scp release/* "$SERVER_USER@$SERVER_HOST:$RELEASE_DIR/"
          ssh "$SERVER_USER@$SERVER_HOST" "ls -la $RELEASE_DIR/"
          echo "✅ 同步完成"
